function done(){let n=0; ['L','R'].forEach(side=>{for(let r=0;r<=3;r++)for(let i=0;i<counts[r];i++) if(winners[mid(side,r,i)]) n++;}); if(winners.F)n++; if(bronze)n++; return n;}
function build(){board.innerHTML='<svg class="links" id="links"></svg>'; window.links=document.getElementById('links');
 const left=document.createElement('div'); left.className='half left'; const center=document.createElement('div'); center.className='center'; const right=document.createElement('div'); right.className='half right';
 left.append(col('L',0,'ラウンド32','6/29〜7/2'),col('L',1,'ラウンド16','7/5〜7/6'),col('L',2,'準々決勝','7/9〜7/10'),col('L',3,'準決勝','7/14'));
 right.append(col('R',0,'ラウンド32','7/2〜7/4'),col('R',1,'ラウンド16','7/6〜7/7'),col('R',2,'準々決勝','7/10〜7/11'),col('R',3,'準決勝','7/15'));
 center.innerHTML=`<div class="rays"></div><div class="trophy-box"><div class="trophy-badge">THE FINAL</div><div class="cup-glow"></div><div class="cup-stage"></div><div class="cup-svg"><svg viewBox="0 0 120 150" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><defs><linearGradient id="goldCup" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#f9e7a6"/><stop offset="38%" stop-color="#e0b24f"/><stop offset="72%" stop-color="#bf8627"/><stop offset="100%" stop-color="#8f5d14"/></linearGradient><linearGradient id="goldBase" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f8e8b2"/><stop offset="100%" stop-color="#a56a17"/></linearGradient></defs><path d="M41 10h38c0 27-4 47-18 61v20h11c4 0 7 3 7 7v6H41v-6c0-4 3-7 7-7h11V71C45 57 41 37 41 10Z" fill="url(#goldCup)"/><path d="M39 14c-3 14-10 20-17 20-6 0-11-4-11-10 0-7 5-12 14-13l3 7c-5 1-8 3-8 6 0 2 2 4 5 4 5 0 9-6 11-15l3 1Zm42 0c3 14 10 20 17 20 6 0 11-4 11-10 0-7-5-12-14-13l-3 7c5 1 8 3 8 6 0 2-2 4-5 4-5 0-9-6-11-15l-3 1Z" fill="url(#goldCup)"/><path d="M42 104h36v13H42z" rx="3" fill="url(#goldBase)"/><path d="M35 117h50v10H35z" rx="3" fill="url(#goldBase)"/><path d="M29 128h62v11H29z" rx="4" fill="url(#goldBase)"/><path d="M60 23c6 10 12 20 12 29 0 8-5 14-12 18-7-4-12-10-12-18 0-9 6-19 12-29Z" fill="rgba(255,255,255,.28)"/></svg></div></div><div class="final-card"><div class="final-title">決勝</div><div class="final-meta">7/19（日）<br>メットライフ・スタジアム</div><div class="match final-match" id="F"><div class="slot" data-s="0"></div><div class="slot" data-s="1"></div></div></div><div class="champion empty" id="champion">優勝予想</div><div class="third"><div class="third-title">3位決定戦</div><div class="third-body"><div class="slot" id="B0"></div><div class="slot" id="B1"></div></div><div class="bronze" id="bronze">🥉 3位予想</div></div>`;
 board.append(left,center,right);}
function col(side,r,label,sub){const c=document.createElement('div'); c.className='col '+(r===0?'r32':r===1?'r16':r===2?'qf':'sf'); c.dataset.side=side;c.dataset.r=r; c.innerHTML=`<div class="clabel">${label}<small>${sub}</small></div><div class="stack"></div>`; const st=c.querySelector('.stack'); for(let i=0;i<counts[r];i++){let m=document.createElement('div');m.className='match';m.id=mid(side,r,i); let letters=(side==='L'?(r===1?LETTERS.L1:r===2?LETTERS.L2:r===3?LETTERS.L3:null):(r===1?LETTERS.R1:r===2?LETTERS.R2:r===3?LETTERS.R3:null)); if(r>0)m.innerHTML=`<div class="mlabel"><span class="badge">${letters[i]}</span></div>`; else m.innerHTML=`<div class="mlabel"><span>${(side==='L'?i*2+1:i*2+17)}-${(side==='L'?i*2+2:i*2+18)}</span></div>`; m.innerHTML+='<div class="slot" data-s="0"></div><div class="slot" data-s="1"></div>'; if(r===0){let d=document.createElement('div');d.className='meta';d.textContent=(side==='L'?LEFT_FIX:RIGHT_FIX)[i]+' JST';m.appendChild(d)} st.appendChild(m);} return c;}
function teamEl(code, chosen, seed, kind, side, r, i){ const btn=document.createElement('button'); btn.className='team'; if(!code){btn.className+=' empty';btn.innerHTML='勝者待ち';return btn;} if(TEAMS[code]?.jp)btn.classList.add('jp'); if(chosen===code)btn.classList.add(kind==='final'?'picked champ':'picked'); else if(chosen)btn.classList.add('out'); btn.innerHTML=`${seed?`<span class="seed">${seed}</span>`:''}<span class="flag">${flag(code)}</span><span class="name">${name(code)}</span><span class="mark">${chosen===code?(kind==='final'?'👑':'✓'):''}</span>`; attach(btn,kind,side,r,i,code); return btn;}
function render(){['L','R'].forEach(side=>{for(let r=0;r<=3;r++)for(let i=0;i<counts[r];i++){let p=parts(side,r,i), chosen=winners[mid(side,r,i)], m=document.getElementById(mid(side,r,i)); [0,1].forEach(s=>{let sl=m.querySelector(`.slot[data-s="${s}"]`);sl.innerHTML='';let seed=r===0?(side==='L'?i*2+s+1:i*2+s+17):''; sl.appendChild(teamEl(p[s],chosen,seed,'normal',side,r,i));});}}); let fp=finalParts(); [0,1].forEach(s=>{let sl=document.querySelector(`#F .slot[data-s="${s}"]`); sl.innerHTML=''; sl.appendChild(teamEl(fp[s],winners.F,'','final','C',4,0));}); let ch=document.getElementById('champion'); if(winners.F){ch.className='champion';ch.innerHTML=`<span class="flag">${flag(winners.F)}</span>${name(winners.F)}`}else{ch.className='champion empty';ch.textContent='優勝予想'}; let bp=bronzeParts(); ['B0','B1'].forEach((id,s)=>{let sl=document.getElementById(id);sl.innerHTML='';sl.appendChild(teamEl(bp[s],bronze,'','bronze','B',0,s));}); let br=document.getElementById('bronze'); if(bronze){br.innerHTML=`🥉 <span class="flag">${flag(bronze)}</span>${name(bronze)}`}else br.innerHTML='🥉 3位予想'; const d=done(); document.getElementById('done').textContent=d; document.getElementById('fill').style.width=(d/32*100)+'%'; drawLines();}
function attach(el,kind,side,r,i,code){let drag=null; const target=()=> kind==='normal'?(r<3?document.getElementById(mid(side,r+1,Math.floor(i/2))):document.getElementById('F')):kind==='final'?document.getElementById('champion'):document.getElementById('bronze'); el.addEventListener('pointerdown',e=>{e.preventDefault();drag={sx:e.clientX,sy:e.clientY,moved:false,g:null,over:false,t:null,id:e.pointerId};try{el.setPointerCapture(e.pointerId)}catch(_){}}); el.addEventListener('pointermove',e=>{if(!drag)return; if(!drag.moved&&Math.hypot(e.clientX-drag.sx,e.clientY-drag.sy)<8)return; drag.moved=true; if(!drag.g){let g=document.createElement('div');g.className='ghost';g.innerHTML=`<span class="flag">${flag(code)}</span>${name(code)}`;document.body.appendChild(g);drag.g=g;el.classList.add('dragging')} drag.g.style.left=e.clientX+'px';drag.g.style.top=e.clientY+'px';let t=target(),overEl=document.elementFromPoint(e.clientX,e.clientY),over=t&&overEl&&t.contains(overEl);if(drag.t&&drag.t!==t)drag.t.classList.remove('target');drag.t=t;drag.over=over;if(t)t.classList.toggle('target',!!over)}); const end=()=>{if(!drag)return; if(drag.g)drag.g.remove(); if(drag.t)drag.t.classList.remove('target'); el.classList.remove('dragging'); let ok=!drag.moved||drag.over; drag=null; if(ok)choose(kind,side,r,i,code)}; el.addEventListener('pointerup',end);el.addEventListener('pointercancel',end);}
function loc(el,side){const b=board.getBoundingClientRect(), e=el.getBoundingClientRect();return{x:(side==='R'?e.right:e.left)-b.left,y:e.top-b.top+e.height/2}}
function locOut(el,side){const b=board.getBoundingClientRect(), e=el.getBoundingClientRect();return{x:(side==='L'?e.right:e.left)-b.left,y:e.top-b.top+e.height/2}}
function path(a,b){let mx=(a.x+b.x)/2;return `M${a.x} ${a.y} H${mx} V${b.y} H${b.x} `}
function drawLines(){const svg=document.getElementById('links'); let d=''; ['L','R'].forEach(side=>{for(let r=0;r<3;r++)for(let i=0;i<counts[r];i++){let a=locOut(document.getElementById(mid(side,r,i)),side), b=loc(document.getElementById(mid(side,r+1,Math.floor(i/2))),side); d+=path(a,b)}}); ['L','R'].forEach(side=>{let a=locOut(document.getElementById(mid(side,3,0)),side), b=loc(document.getElementById('F'),side==='L'?'L':'R'); d+=path(a,b)}); svg.innerHTML=`<path d="${d}" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity=".72"/>`;}
function setZoom(z,center){z=Math.max(.35,Math.min(1.8,z)); const old=zoom; zoom=z; sheet.style.transform=`scale(${zoom})`; stage.style.width=(1680*zoom)+'px';stage.style.height=(1050*zoom)+'px'; document.getElementById('zoomRange').value=Math.round(zoom*100); document.getElementById('zoomPct').textContent=Math.round(zoom*100)+'%'; if(center&&old){const cx=viewport.scrollLeft+viewport.clientWidth/2, cy=viewport.scrollTop+viewport.clientHeight/2; viewport.scrollLeft=cx*(zoom/old)-viewport.clientWidth/2; viewport.scrollTop=cy*(zoom/old)-viewport.clientHeight/2;} save();}
function fit(){let z=Math.min((viewport.clientWidth-20)/1680,(viewport.clientHeight-20)/1050); setZoom(Math.max(.35,Math.min(1.05,z)),false); viewport.scrollLeft=0; viewport.scrollTop=0; toast('全体表示にしました');}
function toast(t){let el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(el._h);el._h=setTimeout(()=>el.classList.remove('show'),1500)}
document.getElementById('fitBtn').onclick=fit;document.getElementById('minusBtn').onclick=()=>setZoom(zoom-.1,true);document.getElementById('plusBtn').onclick=()=>setZoom(zoom+.1,true);document.getElementById('zoomRange').oninput=e=>setZoom(+e.target.value/100,true);
document.getElementById('resetBtn').onclick=()=>{if(confirm('予想をリセットしますか？')){winners={};bronze=null;save();render();toast('リセットしました')}};
document.getElementById('pngBtn').onclick=async()=>{if(typeof html2canvas!=='function'){toast('画像保存にはネット接続が必要です');return}toast('画像を作成中…');let old=zoom;setZoom(1,false);try{let cv=await html2canvas(sheet,{backgroundColor:'#ffffff',scale:2,width:1680,height:1050,windowWidth:1680});let a=document.createElement('a');a.download='wc2026-bracket-yosou.png';a.href=cv.toDataURL('image/png');a.click();toast('画像を保存しました')}catch(e){toast('画像保存に失敗しました')}setZoom(old,false)};
let pinch=null;viewport.addEventListener('touchstart',e=>{if(e.touches.length===2){let dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pinch={dist:Math.hypot(dx,dy),zoom};}}, {passive:true});viewport.addEventListener('touchmove',e=>{if(pinch&&e.touches.length===2){e.preventDefault();let dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;setZoom(pinch.zoom*Math.hypot(dx,dy)/pinch.dist,true)}}, {passive:false});viewport.addEventListener('touchend',()=>{pinch=null},{passive:true});
window.addEventListener('resize',()=>{if(!suppressFit)fit();else drawLines();});
load(); build(); recompute(); render(); setZoom(zoom,false); setTimeout(()=>fit(),80);
})();
</script>
